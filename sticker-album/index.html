  </head>
  <body>
    <script>
      (function() {
        var h = window.location.hash;
        if (!h.includes('login=')) return;
        var p = new URLSearchParams(h.replace('#', ''));
        var code = p.get('login');
        var name = p.get('name');
        if (code) {
          localStorage.setItem('pending-class-join', JSON.stringify({ code: code, name: name }));
          try {
            var raw = localStorage.getItem('sticker-user-storage');
            if (raw) {
              var store = JSON.parse(raw);
              var state = store.state || store;
              if (name && state.displayName !== name) {
                state.displayName = name;
                localStorage.setItem('sticker-user-storage', JSON.stringify(store));
              }
            }
          } catch(e) {}
          window.location.hash = 'scratch';
        }
      })();
    </script>
    <div id="root"></div>
  </body>
