<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏅 אלבום מדבקות — גיבורי ישראל!</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#0038b8;--white:#fff;--gold:#ffd700;--dark:#0a0a2e;
  --mil:#2d5016;--relax:#7c3aed;--lead:#b8860b;--good:#e11d48;
  --card-w:min(280px,80vw);--card-h:min(380px,110vw);
}
body{font-family:'Heebo',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;overflow-x:hidden;position:relative}

/* ══ Animated BG ══ */
.bg-stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bg-star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite;animation-delay:var(--dl,0s);opacity:0}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:var(--o,0.8);transform:scale(1.2)}}
.bg-stripe{position:fixed;bottom:0;left:0;width:100%;height:6px;background:linear-gradient(90deg,var(--blue) 33%,var(--white) 33% 66%,var(--blue) 66%);z-index:1;opacity:0.5}

/* ══ Header ══ */
.header{position:relative;z-index:10;text-align:center;padding:16px 16px 10px;background:linear-gradient(180deg,rgba(0,56,184,0.3),transparent)}
.back-btn{position:absolute;right:12px;top:12px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:1.4rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:all 0.3s}
.back-btn:hover{background:rgba(255,255,255,0.3);transform:scale(1.1)}
.header h1{font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.5rem,5vw,2.2rem);background:linear-gradient(135deg,var(--gold),#fff8dc,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;margin-bottom:4px}
.header .sub{font-size:0.85rem;color:rgba(255,255,255,0.7)}
.scratch-count{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,215,0,0.1));padding:4px 14px;border-radius:20px;font-size:0.85rem;color:var(--gold);margin-top:6px;border:1px solid rgba(255,215,0,0.3)}
.scratch-count .num{font-weight:900;font-size:1.1rem}

/* ══ View Toggle ══ */
.view-toggle{display:flex;justify-content:center;gap:8px;padding:10px 16px;position:relative;z-index:10}
.view-btn{font-family:'Heebo',sans-serif;padding:10px 24px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.7);border-radius:14px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(4px)}
.view-btn.active{background:linear-gradient(135deg,var(--blue),#1e40af);border-color:var(--gold);color:#fff;box-shadow:0 4px 20px rgba(0,56,184,0.4)}
.view-btn:hover:not(.active){background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4)}

/* ══ Scratch View ══ */
.scratch-view{display:flex;flex-direction:column;align-items:center;padding:20px 16px;position:relative;z-index:10;min-height:60vh}
.scratch-view.hidden{display:none}
.no-cards{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.6)}
.no-cards .big{font-size:3rem;margin-bottom:12px}
.no-cards p{font-size:1rem;margin-bottom:16px}

/* ══ Scratch Card ══ */
.scratch-card-container{position:relative;width:var(--card-w);height:var(--card-h);perspective:1000px;margin:0 auto}
.scratch-card{position:relative;width:100%;height:100%;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 60px rgba(255,215,0,0.15);transform-style:preserve-3d}
.scratch-card::before{content:'';position:absolute;inset:0;border:3px solid rgba(255,215,0,0.4);border-radius:20px;z-index:5;pointer-events:none}

/* Sticker underneath */
.sticker-reveal{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;border-radius:20px}
.sticker-reveal .emoji{font-size:clamp(4rem,15vw,7rem);filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));line-height:1}
.sticker-reveal .sname{font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.3rem,4vw,1.8rem);font-weight:900;margin-top:12px;text-align:center}
.sticker-reveal .scat{font-size:0.85rem;opacity:0.8;margin-top:4px}
.sticker-reveal .rarity-badge{margin-top:10px;padding:4px 16px;border-radius:20px;font-size:0.8rem;font-weight:700;letter-spacing:1px}
.rarity-common{background:rgba(255,255,255,0.15);color:#ccc}
.rarity-rare{background:rgba(59,130,246,0.25);color:#93c5fd;box-shadow:0 0 15px rgba(59,130,246,0.3)}
.rarity-epic{background:rgba(168,85,247,0.25);color:#c4b5fd;box-shadow:0 0 20px rgba(168,85,247,0.4)}
.rarity-legendary{background:rgba(255,215,0,0.3);color:var(--gold);box-shadow:0 0 30px rgba(255,215,0,0.5);animation:legendaryPulse 1.5s ease-in-out infinite}
@keyframes legendaryPulse{0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.3)}50%{box-shadow:0 0 40px rgba(255,215,0,0.6)}}

/* Scratch canvas overlay */
.scratch-canvas{position:absolute;inset:0;z-index:3;border-radius:20px;cursor:grab;touch-action:none}
.scratch-canvas:active{cursor:grabbing}
.scratch-hint{position:absolute;z-index:4;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.9);font-size:0.9rem;font-weight:700;pointer-events:none;text-shadow:0 2px 4px rgba(0,0,0,0.5);animation:hintBounce 1.5s ease-in-out infinite}
@keyframes hintBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
.scratch-finger{position:absolute;z-index:4;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;pointer-events:none;animation:fingerScratch 2s ease-in-out infinite;opacity:0.9}
@keyframes fingerScratch{0%{transform:translate(-50%,-50%) rotate(-15deg)}25%{transform:translate(-30%,-60%) rotate(0deg)}50%{transform:translate(-70%,-40%) rotate(-10deg)}75%{transform:translate(-40%,-70%) rotate(5deg)}100%{transform:translate(-50%,-50%) rotate(-15deg)}}

/* Open card button */
.open-card-btn{margin-top:20px;font-family:'Heebo',sans-serif;padding:14px 36px;background:linear-gradient(135deg,var(--gold),#f59e0b);color:var(--dark);border:none;border-radius:16px;font-size:1.1rem;font-weight:900;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 20px rgba(255,215,0,0.3);position:relative;z-index:10}
.open-card-btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(255,215,0,0.5)}
.open-card-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.open-card-btn .sparkle-icon{display:inline-block;animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ══ Album View ══ */
.album-view{padding:10px 16px 100px;position:relative;z-index:10}
.album-view.hidden{display:none}

/* Category tabs */
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding:6px 0 12px;-ms-overflow-style:none;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{font-family:'Heebo',sans-serif;white-space:nowrap;padding:8px 16px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);border-radius:12px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.3s;flex-shrink:0}
.cat-tab.active{color:#fff;border-color:var(--cat-color,var(--gold));background:rgba(255,255,255,0.1);box-shadow:0 0 15px rgba(255,215,0,0.2)}
.cat-tab[data-cat="military"]{--cat-color:#4ade80}
.cat-tab[data-cat="relax"]{--cat-color:#a78bfa}
.cat-tab[data-cat="leaders"]{--cat-color:#fbbf24}
.cat-tab[data-cat="good"]{--cat-color:#fb7185}

/* Progress bar */
.progress-section{margin:8px 0 16px;text-align:center}
.progress-bar-wrap{width:100%;height:10px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;margin-top:6px}
.progress-bar-fill{height:100%;border-radius:10px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1);background:linear-gradient(90deg,var(--cat-color,var(--gold)),#fff8dc)}
.progress-text{font-size:0.8rem;color:rgba(255,255,255,0.6)}
.progress-text span{color:var(--gold);font-weight:700}

/* Sticker grid */
.sticker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:400px;margin:0 auto}

/* SVG clip shapes */
svg.clip-defs{position:absolute;width:0;height:0}

/* Album slot */
.album-slot{position:relative;aspect-ratio:1;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;overflow:visible}
.album-slot.empty{background:rgba(255,255,255,0.04);border:2px dashed rgba(255,255,255,0.15)}
.album-slot.empty:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.08)}
.album-slot.filled{background:rgba(255,255,255,0.08);border:2px solid rgba(255,215,0,0.3);animation:slotGlow 3s ease-in-out infinite}
@keyframes slotGlow{0%,100%{box-shadow:0 0 10px rgba(255,215,0,0.1)}50%{box-shadow:0 0 20px rgba(255,215,0,0.2)}}

/* Shape container inside slot */
.slot-shape{width:75%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:4px}

/* Empty slot silhouette */
.slot-shape.empty-shape{opacity:0.15}
.slot-shape.empty-shape .shape-bg{background:rgba(255,255,255,0.3)}
.slot-shape.filled-shape .shape-bg{background:var(--sticker-bg,linear-gradient(135deg,#1a365d,#2d5016))}

.shape-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(2rem,8vw,3rem)}

/* Clip paths per category */
.shape-military .shape-bg{clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%)}
.shape-relax .shape-bg{clip-path:ellipse(48% 48% at 50% 50%)}
.shape-leaders .shape-bg{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.shape-good .shape-bg{clip-path:url(#heart-clip)}

.slot-name{font-size:clamp(0.55rem,2.5vw,0.75rem);color:rgba(255,255,255,0.5);text-align:center;font-weight:700;line-height:1.2;max-width:100%;overflow:hidden}
.album-slot.filled .slot-name{color:rgba(255,255,255,0.9)}
.slot-question{font-size:1.8rem;opacity:0.3}

/* New sticker indicator */
.new-badge{position:absolute;top:-6px;right:-6px;background:var(--good);color:#fff;font-size:0.6rem;font-weight:900;padding:2px 8px;border-radius:10px;z-index:5;animation:newPulse 1s ease-in-out infinite}
@keyframes newPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ══ Reveal Modal ══ */
.reveal-modal{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.4s}
.reveal-modal.show{opacity:1;pointer-events:auto}
.reveal-content{text-align:center;transform:scale(0.8);transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.reveal-modal.show .reveal-content{transform:scale(1)}
.reveal-emoji{font-size:clamp(5rem,20vw,8rem);filter:drop-shadow(0 8px 16px rgba(0,0,0,0.3));animation:revealBounce 0.8s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes revealBounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.reveal-name{font-family:'Frank Ruhl Libre',serif;font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;margin:12px 0 4px;background:linear-gradient(135deg,var(--gold),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.reveal-cat{font-size:0.9rem;color:rgba(255,255,255,0.6);margin-bottom:8px}
.reveal-rarity{display:inline-block;padding:6px 20px;border-radius:20px;font-size:0.85rem;font-weight:700;margin-bottom:16px}
.reveal-msg{font-size:1rem;color:rgba(255,255,255,0.8);margin-bottom:20px}
.reveal-msg.duplicate{color:#f59e0b}
.reveal-close-btn{font-family:'Heebo',sans-serif;padding:12px 32px;background:linear-gradient(135deg,var(--gold),#f59e0b);color:var(--dark);border:none;border-radius:14px;font-size:1rem;font-weight:900;cursor:pointer;transition:all 0.3s}
.reveal-close-btn:hover{transform:scale(1.05)}

/* ══ Completion Modal ══ */
.completion-modal{position:fixed;inset:0;z-index:1100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity 0.5s}
.completion-modal.show{opacity:1;pointer-events:auto}
.completion-content{text-align:center;padding:30px}
.completion-content .trophy{font-size:6rem;animation:trophySpin 2s ease-in-out}
@keyframes trophySpin{0%{transform:scale(0) rotateY(0)}50%{transform:scale(1.3) rotateY(180deg)}100%{transform:scale(1) rotateY(360deg)}}
.completion-content h2{font-family:'Frank Ruhl Libre',serif;font-size:2rem;background:linear-gradient(135deg,var(--gold),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:12px 0}
.completion-content p{color:rgba(255,255,255,0.7);margin-bottom:20px}

/* ══ Tutorial ══ */
.tutorial{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.4s}
.tutorial.show{opacity:1;pointer-events:auto}
.tutorial-content{text-align:center;padding:30px;max-width:350px}
.tutorial-content h2{font-family:'Frank Ruhl Libre',serif;font-size:1.6rem;color:var(--gold);margin-bottom:16px}
.tutorial-step{display:flex;align-items:center;gap:12px;text-align:right;margin:14px 0;color:rgba(255,255,255,0.85);font-size:0.95rem}
.tutorial-step .step-icon{font-size:2rem;flex-shrink:0}
.tutorial-start-btn{font-family:'Heebo',sans-serif;margin-top:20px;padding:14px 40px;background:linear-gradient(135deg,var(--gold),#f59e0b);color:var(--dark);border:none;border-radius:16px;font-size:1.1rem;font-weight:900;cursor:pointer;transition:all 0.3s}
.tutorial-start-btn:hover{transform:scale(1.05)}

/* ══ Total progress (bottom) ══ */
.total-progress{position:fixed;bottom:0;left:0;right:0;z-index:50;background:linear-gradient(180deg,transparent,rgba(10,10,46,0.95) 30%);padding:12px 20px 16px;text-align:center}
.total-bar-wrap{width:100%;max-width:400px;height:8px;background:rgba(255,255,255,0.1);border-radius:8px;overflow:hidden;margin:4px auto 0}
.total-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width 1s cubic-bezier(0.34,1.56,0.64,1)}
.total-text{font-size:0.75rem;color:rgba(255,255,255,0.5)}
.total-text span{color:var(--gold);font-weight:700}

/* ══ Confetti Canvas ══ */
#confettiCanvas{position:fixed;inset:0;z-index:999;pointer-events:none}

/* ══ Responsive ══ */
@media(max-width:380px){
  .sticker-grid{gap:8px}
  .album-slot{border-radius:12px}
  :root{--card-w:85vw;--card-h:115vw}
}
@media(min-width:600px){
  .sticker-grid{grid-template-columns:repeat(3,1fr);max-width:500px}
  :root{--card-w:320px;--card-h:420px}
}
</style>
</head>
<body>

<!-- SVG clip path definitions -->
<svg class="clip-defs" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="heart-clip" clipPathUnits="objectBoundingBox">
      <path d="M0.5,0.9 C0.5,0.9 0.02,0.6 0.02,0.33 C0.02,0.13 0.18,0.02 0.35,0.1 C0.42,0.13 0.48,0.2 0.5,0.28 C0.52,0.2 0.58,0.13 0.65,0.1 C0.82,0.02 0.98,0.13 0.98,0.33 C0.98,0.6 0.5,0.9 0.5,0.9Z"/>
    </clipPath>
  </defs>
</svg>

<!-- BG Stars -->
<div class="bg-stars" id="bgStars"></div>
<div class="bg-stripe"></div>

<!-- Confetti -->
<canvas id="confettiCanvas"></canvas>

<!-- Header -->
<header class="header">
  <a href="../index.html" class="back-btn" title="חזרה">🏠</a>
  <h1>🏅 אלבום מדבקות — גיבורי ישראל!</h1>
  <div class="sub">גרדו, גלו ואספו את כל המדבקות!</div>
  <div class="scratch-count">✨ כרטיסי גירוד: <span class="num" id="scratchNum">5</span></div>
</header>

<!-- View Toggle -->
<div class="view-toggle">
  <button class="view-btn active" data-view="scratch" onclick="switchView('scratch')">🎴 גרדו!</button>
  <button class="view-btn" data-view="album" onclick="switchView('album')">📖 האלבום</button>
</div>

<!-- ═══ Scratch View ═══ -->
<div class="scratch-view" id="scratchView">
  <div id="scratchArea"></div>
  <button class="open-card-btn" id="openCardBtn" onclick="openNewCard()">
    <span class="sparkle-icon">✨</span> פתחו כרטיס גירוד!
  </button>
</div>

<!-- ═══ Album View ═══ -->
<div class="album-view hidden" id="albumView">
  <div class="cat-tabs" id="catTabs"></div>
  <div class="progress-section" id="catProgress"></div>
  <div class="sticker-grid" id="stickerGrid"></div>
</div>

<!-- Total Progress -->
<div class="total-progress">
  <div class="total-text">האלבום: <span id="totalCount">0</span>/24</div>
  <div class="total-bar-wrap"><div class="total-bar-fill" id="totalBar" style="width:0%"></div></div>
</div>

<!-- Reveal Modal -->
<div class="reveal-modal" id="revealModal">
  <div class="reveal-content">
    <div class="reveal-emoji" id="revealEmoji"></div>
    <div class="reveal-name" id="revealName"></div>
    <div class="reveal-cat" id="revealCat"></div>
    <div class="reveal-rarity" id="revealRarity"></div>
    <div class="reveal-msg" id="revealMsg"></div>
    <button class="reveal-close-btn" onclick="closeReveal()">👍 יופי!</button>
  </div>
</div>

<!-- Completion Modal -->
<div class="completion-modal" id="completionModal">
  <div class="completion-content">
    <div class="trophy">🏆</div>
    <h2 id="completionTitle"></h2>
    <p id="completionMsg"></p>
    <button class="reveal-close-btn" onclick="closeCompletion()">🎉 מעולה!</button>
  </div>
</div>

<!-- Tutorial -->
<div class="tutorial" id="tutorial">
  <div class="tutorial-content">
    <h2>🏅 ברוכים הבאים לאלבום!</h2>
    <div class="tutorial-step"><span class="step-icon">🎴</span><span>פתחו כרטיס גירוד חדש</span></div>
    <div class="tutorial-step"><span class="step-icon">👆</span><span>גרדו עם האצבע לגלות מדבקה</span></div>
    <div class="tutorial-step"><span class="step-icon">📖</span><span>עברו לאלבום לראות את האוסף</span></div>
    <div class="tutorial-step"><span class="step-icon">⭐</span><span>אספו את כל 24 המדבקות!</span></div>
    <button class="tutorial-start-btn" onclick="closeTutorial()">!יאללה, בואו נתחיל 🚀</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  STICKER DATA
// ═══════════════════════════════════════
const CATEGORIES = [
  { id:'military', name:'🎖️ צבאית', color:'#4ade80', bg:'linear-gradient(135deg,#1a3a1a,#2d5016)', shape:'shape-military' },
  { id:'relax', name:'🧘 הירגעות', color:'#a78bfa', bg:'linear-gradient(135deg,#2e1065,#4c1d95)', shape:'shape-relax' },
  { id:'leaders', name:'👑 מנהיגים', color:'#fbbf24', bg:'linear-gradient(135deg,#422006,#78350f)', shape:'shape-leaders' },
  { id:'good', name:'💛 מעשים טובים', color:'#fb7185', bg:'linear-gradient(135deg,#4c0519,#881337)', shape:'shape-good' }
];

let state = {
  collected: [],       // array of sticker IDs
  scratches: 5,        // remaining scratch cards
  currentCat: 'military',
  tutorialSeen: false,
  lastFreeDate: null
};

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('stickerAlbumState'));
    if (s) {
      state.collected = s.collected || [];
      state.scratches = s.scratches ?? 5;
      state.currentCat = s.currentCat || 'military';
      state.tutorialSeen = s.tutorialSeen || false;
      state.lastFreeDate = s.lastFreeDate || null;
    }
  } catch(e) {}
  // Daily free cards
  const today = new Date().toDateString();
  if (state.lastFreeDate !== today) {
    state.scratches = Math.max(state.scratches, 5);
    state.lastFreeDate = today;
  }
  saveState();
}

function saveState() {
  localStorage.setItem('stickerAlbumState', JSON.stringify(state));
  updateUI();
}

let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type='sine', vol=0.12) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e){}
}

function playScratchSound() { playTone(200 + Math.random()*300, 0.06, 'sawtooth', 0.04); }

function playRevealSound() {
  [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => playTone(f, 0.4, 'sine', 0.1), i*100));
}

function playPlaceSound() { playTone(880, 0.15, 'sine', 0.1); setTimeout(()=>playTone(1320,0.2,'sine',0.08),80); }

function playLegendarySound() {
  [392,523,659,784,1047,1319].forEach((f,i) => setTimeout(() => playTone(f, 0.5, 'triangle', 0.12), i*120));
}

const confCanvas = document.getElementById('confettiCanvas');
const confCtx = confCanvas.getContext('2d');
let confParts = [];
let confAnim = null;

function resizeConfetti() { confCanvas.width = window.innerWidth; confCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function launchConfetti(count=60, colors=['#ffd700','#0038b8','#fff','#4ade80','#fb7185','#a78bfa']) {
  for (let i = 0; i < count; i++) {
    confParts.push({
      x: Math.random() * confCanvas.width,
      y: confCanvas.height + 10,
      vx: (Math.random()-0.5) * 8,
      vy: -(Math.random()*12 + 8),
      w: Math.random()*8+4, h: Math.random()*6+3,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*360, rotV: (Math.random()-0.5)*10,
      life: 1, decay: 0.005 + Math.random()*0.005
    });
  }
  if (!confAnim) animateConfetti();
}

function animateConfetti() {
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confParts.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.25; p.rot += p.rotV; p.life -= p.decay;
    if (p.life <= 0) return;
    confCtx.save();
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.rot * Math.PI/180);
    confCtx.globalAlpha = p.life;
    confCtx.fillStyle = p.color;
    confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confCtx.restore();
  });
  confParts = confParts.filter(p => p.life > 0);
  if (confParts.length > 0) {
    confAnim = requestAnimationFrame(animateConfetti);
  } else {
    confAnim = null;
    confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  }
}

// ═══════════════════════════════════════
//  SCRATCH CARD ENGINE
// ═══════════════════════════════════════
let currentCard = null;
let isScratching = false;
let scratchPercent = 0;
let cardRevealed = false;

function openNewCard() {
  if (state.scratches <= 0) return;
  if (currentCard && !cardRevealed) return;

  // Pick random sticker (weighted by rarity)
  const sticker = pickRandomSticker();
  currentCard = sticker;
  cardRevealed = false;
  scratchPercent = 0;
  state.scratches--;
  saveState();

  const area = document.getElementById('scratchArea');
  const cat = CATEGORIES.find(c => c.id === sticker.cat);

  area.innerHTML = `
    <div class="scratch-card-container">
      <div class="scratch-card">
        <div class="sticker-reveal" style="background:${sticker.bg}">
          <div class="emoji">${sticker.emoji}</div>
          <div class="sname">${sticker.name}</div>
          <div class="scat">${cat.name}</div>
          <div class="rarity-badge ${RARITY_CONFIG[sticker.rarity].cssClass}">${RARITY_CONFIG[sticker.rarity].label}</div>
        </div>
        <canvas class="scratch-canvas" id="scratchCanvas"></canvas>
        <div class="scratch-finger" id="scratchFinger">👆</div>
        <div class="scratch-hint" id="scratchHint">✨ !גרדו כאן ✨</div>
      </div>
    </div>`;

  // Wait for DOM layout to complete, then init canvas
  document.getElementById('openCardBtn').style.display = 'none';
  setTimeout(() => {
    const canvas = document.getElementById('scratchCanvas');
    if (!canvas) return;
    const container = canvas.closest('.scratch-card');
    const rect = container.getBoundingClientRect();
    canvas.width = Math.round(rect.width);
    canvas.height = Math.round(rect.height);
    if (canvas.width === 0 || canvas.height === 0) {
      // Fallback dimensions
      canvas.width = 280; canvas.height = 380;
    }
    drawScratchOverlay(canvas);
    attachScratchEvents(canvas);
  }, 100);
}

function drawScratchOverlay(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // Golden metallic gradient
  const grad = ctx.createLinearGradient(0,0,w,h);
  grad.addColorStop(0, '#c6a700');
  grad.addColorStop(0.2, '#ffd700');
  grad.addColorStop(0.4, '#fff8dc');
  grad.addColorStop(0.6, '#ffd700');
  grad.addColorStop(0.8, '#c6a700');
  grad.addColorStop(1, '#ffd700');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,w,h);

  // Diagonal shine lines
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  for (let i = -h; i < w+h; i += 20) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i + h, h);
    ctx.stroke();
  }

  // Star of David pattern
  ctx.fillStyle = 'rgba(0,56,184,0.08)';
  for (let x = 30; x < w; x += 80) {
    for (let y = 30; y < h; y += 80) {
      drawStar6(ctx, x, y, 15);
    }
  }

  // Center text
  ctx.fillStyle = 'rgba(0,56,184,0.5)';
  ctx.font = `bold ${Math.min(w*0.07,22)}px Heebo,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✨ גרדו לגילוי! ✨', w/2, h/2);
}

function drawStar6(ctx, cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i*60 - 90) * Math.PI/180;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](cx + r*Math.cos(a), cy + r*Math.sin(a));
  }
  ctx.closePath();
  ctx.fill();
}

function attachScratchEvents(canvas) {
  const ctx = canvas.getContext('2d');
  let lastX = -1, lastY = -1;
  const BRUSH = Math.max(35, Math.round(canvas.width * 0.12));

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    let cx, cy;
    if (e.touches && e.touches.length > 0) {
      cx = e.touches[0].clientX; cy = e.touches[0].clientY;
    } else {
      cx = e.clientX; cy = e.clientY;
    }
    return {
      x: (cx - r.left) * (canvas.width / r.width),
      y: (cy - r.top) * (canvas.height / r.height)
    };
  }

  function hideHints() {
    const finger = document.getElementById('scratchFinger');
    const hint = document.getElementById('scratchHint');
    if (finger) finger.style.display = 'none';
    if (hint) hint.style.display = 'none';
  }

  function eraseAt(x, y) {
    ctx.globalCompositeOperation = 'destination-out';
    if (lastX >= 0 && lastY >= 0) {
      ctx.lineWidth = BRUSH;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(x, y, BRUSH * 0.6, 0, Math.PI*2);
    ctx.fill();
    lastX = x; lastY = y;
  }

  function startScratch(e) {
    e.preventDefault(); e.stopPropagation();
    if (cardRevealed) return;
    isScratching = true;
    hideHints();
    const p = getPos(e);
    lastX = p.x; lastY = p.y;
    eraseAt(p.x, p.y);
  }

  function doScratch(e) {
    e.preventDefault(); e.stopPropagation();
    if (!isScratching || cardRevealed) return;
    const p = getPos(e);
    eraseAt(p.x, p.y);
    playScratchSound();
    haptic(10);
    checkReveal(canvas);
  }

  function stopScratch(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    isScratching = false;
    lastX = -1; lastY = -1;
  }

  // Touch events (primary for mobile)
  canvas.addEventListener('touchstart', startScratch, {passive:false});
  canvas.addEventListener('touchmove', doScratch, {passive:false});
  canvas.addEventListener('touchend', stopScratch, {passive:false});
  canvas.addEventListener('touchcancel', stopScratch, {passive:false});
  // Mouse events (desktop fallback)
  canvas.addEventListener('mousedown', startScratch, {passive:false});
  canvas.addEventListener('mousemove', doScratch, {passive:false});
  canvas.addEventListener('mouseup', stopScratch);
  canvas.addEventListener('mouseleave', stopScratch);
}

function checkReveal(canvas) {
  if (cardRevealed) return;
  const ctx = canvas.getContext('2d');
  // Sample a grid of points instead of full image data
  const w = canvas.width, h = canvas.height;
  const step = Math.max(8, Math.round(Math.min(w,h) / 20));
  let total = 0, transparent = 0;
  const imgData = ctx.getImageData(0,0,w,h);
  const data = imgData.data;
  for (let y = 0; y < h; y += step) {
    for (let x = 0; x < w; x += step) {
      const idx = (y * w + x) * 4 + 3; // alpha channel
      total++;
      if (data[idx] === 0) transparent++;
    }
  }
  scratchPercent = transparent / total;

  if (scratchPercent > 0.28) {
    revealCard(canvas);
  }
}

function revealCard(canvas) {
  if (cardRevealed) return;
  cardRevealed = true;

  // Fade out canvas
  canvas.style.transition = 'opacity 0.5s';
  canvas.style.opacity = '0';
  setTimeout(() => canvas.style.display = 'none', 500);

  // Add to collection
  const isDuplicate = state.collected.includes(currentCard.id);
  if (!isDuplicate) {
    state.collected.push(currentCard.id);
  }
  saveState();

  // Show reveal modal
  setTimeout(() => showRevealModal(currentCard, isDuplicate), 300);

  // Re-show open button
  setTimeout(() => {
    document.getElementById('openCardBtn').style.display = '';
    document.getElementById('openCardBtn').disabled = state.scratches <= 0;
    if (state.scratches <= 0) {
      document.getElementById('openCardBtn').innerHTML = '😴 נגמרו הכרטיסים — חזרו מחר!';
    }
  }, 400);
}

// ═══════════════════════════════════════
//  STICKER PICKING (weighted random)
// ═══════════════════════════════════════
function pickRandomSticker() {
  // Prefer uncollected stickers (70% chance if any left)
  const uncollected = STICKERS.filter(s => !state.collected.includes(s.id));
  const pool = (uncollected.length > 0 && Math.random() < 0.7) ? uncollected : STICKERS;

  // Weight by rarity
  const weighted = [];
  pool.forEach(s => {
    const w = RARITY_CONFIG[s.rarity].weight;
    for (let i = 0; i < w; i++) weighted.push(s);
  });
  return weighted[Math.floor(Math.random() * weighted.length)];
}

function showRevealModal(sticker, isDuplicate) {
  const cat = CATEGORIES.find(c => c.id === sticker.cat);
  const rarity = RARITY_CONFIG[sticker.rarity];

  document.getElementById('revealEmoji').textContent = sticker.emoji;
  document.getElementById('revealName').textContent = sticker.name;
  document.getElementById('revealCat').textContent = cat.name;

  const rb = document.getElementById('revealRarity');
  rb.textContent = rarity.label;
  rb.className = 'reveal-rarity ' + rarity.cssClass;

  const msg = document.getElementById('revealMsg');
  if (isDuplicate) {
    msg.textContent = '🔄 כבר יש לכם את המדבקה הזו!';
    msg.className = 'reveal-msg duplicate';
  } else {
    msg.textContent = '🎉 מדבקה חדשה נוספה לאלבום!';
    msg.className = 'reveal-msg';
  }

  document.getElementById('revealModal').classList.add('show');

  // Effects
  if (sticker.rarity === 'legendary') {
    playLegendarySound();
    launchConfetti(120, ['#ffd700','#fff8dc','#f59e0b','#fbbf24']);
    haptic([50,30,50,30,80]);
  } else if (sticker.rarity === 'epic') {
    playRevealSound();
    launchConfetti(80, ['#a78bfa','#c4b5fd','#7c3aed','#ffd700']);
    haptic([30,20,50]);
  } else {
    playRevealSound();
    launchConfetti(40);
    haptic(50);
  }

  // Check category completion
  if (!isDuplicate) {
    const catStickers = STICKERS.filter(s => s.cat === sticker.cat);
    const catCollected = catStickers.filter(s => state.collected.includes(s.id));
    if (catCollected.length === catStickers.length) {
      setTimeout(() => showCategoryComplete(cat), 1500);
    }
    // Check total completion
    if (state.collected.length === STICKERS.length) {
      setTimeout(() => showTotalComplete(), 2500);
    }
  }
}

function renderAlbum() {
  renderCatTabs();
  renderCatGrid(state.currentCat);
}

function renderCatTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = CATEGORIES.map(c => {
    const count = STICKERS.filter(s => s.cat === c.id && state.collected.includes(s.id)).length;
    const total = STICKERS.filter(s => s.cat === c.id).length;
    const active = c.id === state.currentCat ? 'active' : '';
    return `<button class="cat-tab ${active}" data-cat="${c.id}" onclick="selectCat('${c.id}')">${c.name} <span style="opacity:0.6;font-size:0.75rem">${count}/${total}</span></button>`;
  }).join('');
}

function selectCat(catId) {
  state.currentCat = catId;
  saveState();
  renderAlbum();
}

function renderCatGrid(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const catStickers = STICKERS.filter(s => s.cat === catId);
  const collected = catStickers.filter(s => state.collected.includes(s.id)).length;
  const pct = Math.round((collected / catStickers.length) * 100);

  // Progress
  const prog = document.getElementById('catProgress');
  prog.innerHTML = `
    <div class="progress-text">${cat.name}: <span>${collected}/${catStickers.length}</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${pct}%;--cat-color:${cat.color}"></div>
    </div>`;

  // Grid
  const grid = document.getElementById('stickerGrid');
  grid.innerHTML = catStickers.map(s => {
    const has = state.collected.includes(s.id);
    const isNew = has && !state.viewed?.includes(s.id);
    return `
      <div class="album-slot ${has ? 'filled' : 'empty'}" onclick="tapSlot(${s.id})" data-id="${s.id}">
        ${isNew ? '<div class="new-badge">חדש!</div>' : ''}
        <div class="slot-shape ${has ? 'filled-shape' : 'empty-shape'} ${cat.shape}">
          <div class="shape-bg" style="${has ? 'background:'+s.bg : ''}">
            ${has ? s.emoji : '<span class="slot-question">?</span>'}
          </div>
        </div>
        <div class="slot-name">${has ? s.name : '???'}</div>
      </div>`;
  }).join('');
}

function tapSlot(id) {
  const s = STICKERS.find(st => st.id === id);
  if (!s || !state.collected.includes(id)) return;
  // Little celebration on tap
  playPlaceSound();
  haptic(20);

  // Animate the slot
  const slot = document.querySelector(`.album-slot[data-id="${id}"]`);
  if (slot) {
    slot.style.transform = 'scale(1.15)';
    setTimeout(() => slot.style.transform = '', 300);
  }
}

// ═══════════════════════════════════════
//  UI UPDATES
// ═══════════════════════════════════════
function updateUI() {
  document.getElementById('scratchNum').textContent = state.scratches;
  const total = state.collected.length;
  document.getElementById('totalCount').textContent = total;
  const pct = Math.round((total / STICKERS.length) * 100);
  document.getElementById('totalBar').style.width = pct + '%';

  const btn = document.getElementById('openCardBtn');
  if (currentCard && !cardRevealed) {
    btn.style.display = 'none';
  } else {
    btn.style.display = '';
    btn.disabled = state.scratches <= 0;
    if (state.scratches <= 0) {
      btn.innerHTML = '😴 נגמרו הכרטיסים — חזרו מחר!';
    } else {
      btn.innerHTML = '<span class="sparkle-icon">✨</span> פתחו כרטיס גירוד!';
    }
  }
}

// ═══════════════════════════════════════
//  TUTORIAL
// ═══════════════════════════════════════
function closeTutorial() {
  document.getElementById('tutorial').classList.remove('show');
  state.tutorialSeen = true;
  saveState();
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
loadState();
updateUI();
if (!state.tutorialSeen) {
  document.getElementById('tutorial').classList.add('show');
}
</script>
</body>
</html>
