<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍽️ קערת הסדר — למדו את הסימנים!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #c9952a;
      --gold-light: #f0c040;
      --brown: #7a4a1e;
      --brown-light: #a0642e;
      --cream: #fff8e7;
      --cream-dark: #fef0c7;
      --red-muted: #c0392b;
      --green-muted: #4a7c3f;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(180deg, #fef9ef, #fff7ed, #fffbeb);
      color: #3a2210;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 10px 30px;
      overflow-x: hidden;
    }

    /* ── BACK LINK ── */
    .back-link {
      position: fixed; top: 12px; right: 12px;
      color: var(--brown); text-decoration: none;
      font-size: 0.85rem; z-index: 200;
      background: var(--cream); padding: 5px 12px;
      border-radius: 8px; box-shadow: 0 2px 8px rgba(122,74,30,0.18);
      border: 1px solid #e8c97a;
      transition: transform 0.15s;
    }
    .back-link:hover { transform: scale(1.05); }

    /* ── HEADER ── */
    h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(1.3rem, 5vw, 2rem);
      color: var(--brown);
      text-align: center;
      margin: 12px 0 2px;
      text-shadow: 0 1px 3px rgba(201,149,42,0.3);
    }
    .subtitle {
      font-size: 0.88rem;
      color: var(--brown-light);
      text-align: center;
      margin-bottom: 10px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
      background: var(--cream-dark); border-radius: 12px; padding: 4px;
      border: 1px solid #e8c97a;
    }
    .tab-btn {
      flex: 1; padding: 8px 14px; border: none; cursor: pointer;
      border-radius: 9px; font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 700;
      background: transparent; color: var(--brown-light);
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--gold); color: #fff;
      box-shadow: 0 2px 8px rgba(201,149,42,0.35);
    }

    /* ── SCREENS ── */
    .screen { width: 100%; max-width: 520px; display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════
       LEARN SCREEN — round plate
    ══════════════════════════════════════ */
    .plate-container {
      position: relative;
      width: min(340px, 90vw);
      height: min(340px, 90vw);
      margin: 0 auto 20px;
    }

    /* Decorative outer ring */
    .plate-outer {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #fffbe8 0%, #e8c97a 55%, #c9952a 75%, #a0782a 100%);
      box-shadow:
        0 8px 30px rgba(122,74,30,0.3),
        inset 0 2px 6px rgba(255,255,255,0.6),
        inset 0 -4px 10px rgba(122,74,30,0.2);
    }

    /* Inner plate area */
    .plate-inner {
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 38%, #fffef5 0%, #fff8e7 60%, #faecc2 100%);
      box-shadow: inset 0 2px 8px rgba(122,74,30,0.12);
      display: flex; align-items: center; justify-content: center;
    }

    .plate-center-text {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(0.65rem, 2.5vw, 0.8rem);
      color: var(--gold);
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      pointer-events: none;
      user-select: none;
    }

    /* Item slots around the plate */
    .plate-item {
      position: absolute;
      width: 62px; height: 62px;
      border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer;
      background: radial-gradient(circle at 35% 30%, #fffbe8, #faecc2);
      border: 2.5px solid var(--gold);
      box-shadow: 0 3px 10px rgba(122,74,30,0.22), inset 0 1px 3px rgba(255,255,255,0.7);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 10;
      transform: translate(-50%, -50%);
    }
    .plate-item:hover {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 6px 18px rgba(201,149,42,0.5);
      z-index: 20;
    }
    .plate-item.selected {
      border-color: var(--red-muted);
      background: radial-gradient(circle at 35% 30%, #fff5f0, #fddcc4);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.25), 0 4px 14px rgba(122,74,30,0.3);
    }
    .plate-item .item-emoji { font-size: 1.55rem; line-height: 1; }
    .plate-item .item-name {
      font-size: 0.52rem; font-weight: 700; color: var(--brown);
      text-align: center; margin-top: 1px; line-height: 1.1;
    }

    /* Info card */
    .info-card {
      width: 100%; max-width: 460px;
      background: var(--cream);
      border: 2px solid var(--gold);
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: 0 4px 16px rgba(122,74,30,0.14);
      min-height: 130px;
      position: relative;
      overflow: hidden;
    }
    .info-card::before {
      content: '';
      position: absolute; top: 0; right: 0;
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(201,149,42,0.12), transparent 70%);
      border-radius: 50%;
    }
    .info-card-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100px; color: #c9ab6e; font-size: 0.9rem; text-align: center; gap: 6px;
    }
    .info-card-content { display: none; }
    .info-card-content.show { display: block; }
    .info-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.3rem; font-weight: 700; color: var(--brown);
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .info-tag {
      display: inline-block; font-size: 0.72rem; padding: 2px 8px;
      border-radius: 10px; font-weight: 700;
      background: var(--gold-light); color: var(--brown);
      margin-bottom: 6px;
    }
    .info-what, .info-why, .info-symbol {
      font-size: 0.88rem; color: #5a3518; margin-bottom: 5px; line-height: 1.55;
    }
    .info-label {
      font-weight: 700; color: var(--gold); font-size: 0.8rem; display: block; margin-top: 6px;
    }

    /* ══════════════════════════════════════
       QUIZ SCREEN
    ══════════════════════════════════════ */
    .quiz-header {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .score-box {
      background: var(--cream-dark); border: 1.5px solid var(--gold);
      border-radius: 10px; padding: 4px 12px;
      font-weight: 700; color: var(--brown); font-size: 0.9rem;
    }
    .quiz-instruction {
      text-align: center; font-size: 0.88rem; color: var(--brown-light);
      margin-bottom: 12px; font-style: italic;
    }

    /* Quiz plate */
    .quiz-plate-wrap {
      position: relative;
      width: min(300px, 85vw);
      height: min(300px, 85vw);
      margin: 0 auto 18px;
    }
    .quiz-plate-outer {
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #fffbe8 0%, #e8c97a 55%, #c9952a 75%, #a0782a 100%);
      box-shadow: 0 6px 24px rgba(122,74,30,0.28), inset 0 2px 5px rgba(255,255,255,0.5);
    }
    .quiz-plate-inner {
      position: absolute; inset: 12%; border-radius: 50%;
      background: radial-gradient(circle at 40% 38%, #fffef5 0%, #fff8e7 70%, #faecc2 100%);
    }

    /* Drop zones on quiz plate */
    .drop-zone {
      position: absolute;
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2.5px dashed var(--gold);
      background: rgba(255,248,231,0.7);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 0.52rem; color: var(--gold); font-weight: 700; text-align: center;
      transition: all 0.2s;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 10;
    }
    .drop-zone.drag-over {
      background: rgba(201,149,42,0.2);
      border-color: var(--brown);
      transform: translate(-50%, -50%) scale(1.1);
    }
    .drop-zone.correct {
      border-style: solid;
      border-color: var(--green-muted);
      background: rgba(74,124,63,0.12);
      animation: correctPop 0.5s ease;
    }
    .drop-zone.wrong {
      border-color: var(--red-muted);
      background: rgba(192,57,43,0.1);
      animation: wrongShake 0.4s ease;
    }
    .drop-zone .dz-emoji { font-size: 1.4rem; }
    .drop-zone .dz-label { font-size: 0.5rem; font-weight: 700; color: var(--brown); margin-top: 1px; }

    @keyframes correctPop {
      0%   { transform: translate(-50%, -50%) scale(1); }
      40%  { transform: translate(-50%, -50%) scale(1.3); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes wrongShake {
      0%,100% { transform: translate(-50%, -50%) translateX(0); }
      20%      { transform: translate(-50%, -50%) translateX(-6px); }
      60%      { transform: translate(-50%, -50%) translateX(6px); }
    }

    /* Draggable items bank */
    .items-bank {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
      width: 100%; margin-bottom: 14px;
    }
    .drag-item {
      width: 68px; height: 68px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: grab;
      background: radial-gradient(circle at 35% 30%, #fffbe8, #faecc2);
      border: 2.5px solid var(--gold);
      box-shadow: 0 3px 10px rgba(122,74,30,0.2);
      transition: transform 0.15s, opacity 0.2s;
      touch-action: none;
      user-select: none;
    }
    .drag-item:active { cursor: grabbing; transform: scale(1.1); opacity: 0.85; }
    .drag-item.dragging { opacity: 0.4; transform: scale(0.95); }
    .drag-item.placed { opacity: 0; pointer-events: none; }
    .drag-item .di-emoji { font-size: 1.6rem; }
    .drag-item .di-name { font-size: 0.52rem; font-weight: 700; color: var(--brown); text-align: center; }

    /* Reset btn */
    .reset-btn {
      background: none; border: 1.5px solid var(--gold);
      border-radius: 10px; padding: 6px 18px;
      color: var(--brown); font-family: 'Heebo', sans-serif;
      font-size: 0.85rem; cursor: pointer;
      transition: background 0.2s;
    }
    .reset-btn:hover { background: var(--cream-dark); }

    /* ── CELEBRATION ── */
    .celebration {
      display: none;
      position: fixed; inset: 0;
      background: rgba(254,249,239,0.95);
      z-index: 300;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }
    .celebration.show { display: flex; }
    .cel-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(1.8rem, 7vw, 2.8rem);
      color: var(--brown); margin-bottom: 10px;
    }
    .cel-sub { font-size: 1rem; color: var(--brown-light); margin-bottom: 20px; }
    .cel-emoji { font-size: 4rem; margin-bottom: 10px; animation: bounce 0.8s infinite alternate; }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-14px); }
    }

    /* confetti */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none; z-index: 400;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Share btn */
    .share-btn {
      background: #25D366; color: #fff; border: none; border-radius: 12px;
      padding: 10px 22px; font-family: 'Heebo', sans-serif; font-weight: 700;
      font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 14px rgba(37,211,102,0.35);
      transition: transform 0.15s;
    }
    .share-btn:hover { transform: scale(1.05); }

    .play-again-btn {
      margin-top: 10px;
      background: var(--gold); color: #fff; border: none; border-radius: 12px;
      padding: 10px 28px; font-family: 'Heebo', sans-serif; font-weight: 700;
      font-size: 1rem; cursor: pointer;
      box-shadow: 0 4px 14px rgba(201,149,42,0.35);
      transition: transform 0.15s;
    }
    .play-again-btn:hover { transform: scale(1.05); }

    /* ── FLOATING STAR ── */
    .float-star {
      position: fixed; pointer-events: none; z-index: 250; font-size: 1.6rem;
      animation: floatUp 0.9s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0.5); opacity: 1; }
      100% { transform: translateY(-90px) scale(1.4); opacity: 0; }
    }

    /* ── MOBILE ── */
    @media (max-width: 400px) {
      .plate-item { width: 52px; height: 52px; }
      .plate-item .item-emoji { font-size: 1.3rem; }
      .drop-zone { width: 48px; height: 48px; }
      .drag-item { width: 58px; height: 58px; }
    }
  </style>
</head>

<a class="back-link" href="../index.html">← חזרה</a>

<h1>🍽️ קערת הסדר</h1>
<p class="subtitle">למדו את הסימנים של ליל הסדר!</p>

<!-- TABS -->
<div class="tabs">

<!-- ══════════════════════════════════════

<div id="screen-learn" class="screen active">

<!-- ══════════════════════════════════════
     QUIZ SCREEN
══════════════════════════════════════ -->
<div id="screen-quiz" class="screen">

    <div class="score-box">⭐ ניקוד: <span id="score-display">0</span>/6</div>
    <button class="reset-btn" onclick="resetQuiz()">🔄 אפס משחק</button>

     CELEBRATION OVERLAY

</div>

// Positions around plate (percentage of container, center-based)
// 6 items at 60° intervals starting from top
const POSITIONS = [
  { top: '10%',  left: '50%',  label: 'למעלה'      }, // 0° — top
  { top: '28%',  left: '85%',  label: 'ימין עליון' }, // 60°
  { top: '72%',  left: '85%',  label: 'ימין תחתון' }, // 120°
  { top: '90%',  left: '50%',  label: 'למטה'       }, // 180°
  { top: '72%',  left: '15%',  label: 'שמאל תחתון' }, // 240°
  { top: '28%',  left: '15%',  label: 'שמאל עליון' }, // 300°
];

// ══════════════════════════════════════
//  LEARN SCREEN
// ══════════════════════════════════════
function buildLearnPlate() {
  const plate = document.getElementById('learn-plate');
  ITEMS.forEach((item, i) => {
    const pos = POSITIONS[i];
    const el = document.createElement('div');
    el.className = 'plate-item';
    el.style.top = pos.top;
    el.style.left = pos.left;
    el.dataset.id = item.id;
    el.innerHTML = `<span class="item-emoji">${item.emoji}</span><span class="item-name">${item.name}</span>`;
    el.addEventListener('click', () => showInfo(item.id, el));
    plate.appendChild(el);
  });
}

function showInfo(id, el) {
  // Deselect all
  document.querySelectorAll('.plate-item').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');

  const item = ITEMS.find(i => i.id === id);
  document.getElementById('info-placeholder').style.display = 'none';

  const content = document.getElementById('info-content');
  content.innerHTML = `
    <div class="info-title">${item.emoji} ${item.name} <span class="info-tag">${item.tag}</span></div>
    <span class="info-label">📌 מה זה?</span>
    <div class="info-what">${item.what}</div>
    <span class="info-label">🕍 למה אוכלים?</span>
    <div class="info-why">${item.why}</div>
    <span class="info-label">✨ מה זה מסמל?</span>
    <div class="info-symbol">${item.symbol}</div>
  `;
  content.classList.add('show');
}

// ══════════════════════════════════════
//  QUIZ SCREEN
// ══════════════════════════════════════
let quizScore = 0;
let correctPlacements = new Set();
let draggedId = null;
let shuffledItems = [];

function buildQuizPlate() {
  const plate = document.getElementById('quiz-plate');
  // Remove old drop zones
  plate.querySelectorAll('.drop-zone').forEach(z => z.remove());

  ITEMS.forEach((item, i) => {
    const pos = POSITIONS[i];
    const dz = document.createElement('div');
    dz.className = 'drop-zone';
    dz.style.top = pos.top;
    dz.style.left = pos.left;
    dz.dataset.target = item.id;
    dz.innerHTML = `<span style="font-size:1.1rem">?</span><span class="dz-label">${pos.label}</span>`;

    // Drag & Drop events
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleDrop(dz, draggedId); });

    // Touch support
    dz.addEventListener('touchend', e => {
      e.preventDefault();
      if (draggedId) handleDrop(dz, draggedId);
    });

    plate.appendChild(dz);
  });
}

function buildItemsBank() {
  const bank = document.getElementById('items-bank');
  bank.innerHTML = '';
  shuffledItems = [...ITEMS].sort(() => Math.random() - 0.5);

  shuffledItems.forEach(item => {
    const el = document.createElement('div');
    el.className = 'drag-item';
    el.id = 'drag-' + item.id;
    el.draggable = true;
    el.dataset.id = item.id;
    el.innerHTML = `<span class="di-emoji">${item.emoji}</span><span class="di-name">${item.name}</span>`;

    // Mouse drag
    el.addEventListener('dragstart', () => {
      draggedId = item.id;
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
    });

    // Touch drag
    let touchStartX, touchStartY, touchClone;
    el.addEventListener('touchstart', e => {
      draggedId = item.id;
      const t = e.touches[0];
      touchStartX = t.clientX; touchStartY = t.clientY;

      touchClone = el.cloneNode(true);
      touchClone.style.cssText = `
        position:fixed; pointer-events:none; z-index:999; opacity:0.85;
        width:68px; height:68px; border-radius:50%;
        left:${t.clientX - 34}px; top:${t.clientY - 34}px;
        background:radial-gradient(circle at 35% 30%, #fffbe8, #faecc2);
        border:2.5px solid #c9952a;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
      `;
      document.body.appendChild(touchClone);
    }, { passive: true });

    el.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      if (touchClone) {
        touchClone.style.left = (t.clientX - 34) + 'px';
        touchClone.style.top  = (t.clientY - 34) + 'px';
      }
      // Highlight nearest drop zone
      const dz = getDropZoneUnder(t.clientX, t.clientY);
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
      if (dz) dz.classList.add('drag-over');
    }, { passive: false });

    el.addEventListener('touchend', e => {
      if (touchClone) { touchClone.remove(); touchClone = null; }
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
      const t = e.changedTouches[0];
      const dz = getDropZoneUnder(t.clientX, t.clientY);
      if (dz && draggedId) handleDrop(dz, draggedId);
      draggedId = null;
    });

    bank.appendChild(el);
  });
}

function getDropZoneUnder(x, y) {
  const zones = document.querySelectorAll('.drop-zone');
  for (const z of zones) {
    const r = z.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return z;
  }
  return null;
}

function handleDrop(dz, itemId) {
  if (correctPlacements.has(dz.dataset.target)) return; // already filled correctly
  const item = ITEMS.find(i => i.id === itemId);

  if (dz.dataset.target === itemId) {
    // CORRECT!
    correctPlacements.add(itemId);
    quizScore++;
    document.getElementById('score-display').textContent = quizScore;

    dz.innerHTML = `<span class="dz-emoji">${item.emoji}</span><span class="dz-label">${item.name}</span>`;
    dz.classList.add('correct');

    // Hide dragged item
    const dragEl = document.getElementById('drag-' + itemId);
    if (dragEl) dragEl.classList.add('placed');

    // Float star
    spawnStar(dz);
    draggedId = null;

    if (quizScore === 6) {
      setTimeout(showCelebration, 600);
    }
  } else {
    // WRONG
    dz.classList.add('wrong');
    setTimeout(() => dz.classList.remove('wrong'), 600);
    draggedId = null;

    // Little shake on the dragged item
    const dragEl = document.getElementById('drag-' + itemId);
    if (dragEl) {
      dragEl.style.animation = 'none';
      dragEl.style.animation = 'wrongShake 0.4s ease';
      setTimeout(() => dragEl.style.animation = '', 500);
    }
  }
}

function spawnStar(anchor) {
  const rect = anchor.getBoundingClientRect();
  const star = document.createElement('div');
  star.className = 'float-star';
  star.textContent = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
  star.style.left = (rect.left + rect.width/2 - 15) + 'px';
  star.style.top  = rect.top + 'px';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 950);
}

function resetQuiz() {
  quizScore = 0;
  correctPlacements.clear();
  document.getElementById('score-display').textContent = '0';
  buildQuizPlate();
  buildItemsBank();
}

// ══════════════════════════════════════
//  CELEBRATION
// ══════════════════════════════════════
function showCelebration() {
  document.getElementById('celebration').classList.add('show');
  launchConfetti();
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
  resetQuiz();
}

function launchConfetti() {
  const colors = ['#c9952a','#f0c040','#e85d3c','#4a7c3f','#fff8e7','#a0642e'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      c.style.animationDelay = (Math.random() * 0.5) + 's';
      c.style.width = c.style.height = (6 + Math.random() * 8) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3500);
    }, i * 40);
  }
}

// ══════════════════════════════════════
//  TABS
// ══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.includes(tab === 'learn' ? 'למידה' : 'חידון')) b.classList.add('active');
  });
}

buildLearnPlate();
buildQuizPlate();
buildItemsBank();
