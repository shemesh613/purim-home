<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🪙 צדקה קליקר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;min-height:100vh;overflow-x:hidden;user-select:none}
.game{display:flex;flex-direction:column;align-items:center;padding:20px;min-height:100vh}
h1{font-size:1.8rem;margin-bottom:4px;text-shadow:0 2px 10px rgba(212,160,23,0.5)}
.subtitle{font-size:.85rem;color:rgba(255,255,255,0.6);margin-bottom:16px}

/* Score */
.score-area{text-align:center;margin-bottom:20px}
.coins{font-size:3rem;font-weight:900;color:#fbbf24;text-shadow:0 0 30px rgba(251,191,36,0.4)}
.per-sec{font-size:.85rem;color:rgba(255,255,255,0.5)}

/* Big Coin Button */
.coin-btn{width:160px;height:160px;border-radius:50%;border:4px solid #fbbf24;background:radial-gradient(circle at 35% 35%,#fde68a,#d97706,#92400e);cursor:pointer;position:relative;transition:transform .1s;box-shadow:0 0 40px rgba(251,191,36,0.3),inset 0 -8px 20px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:4rem;margin:10px 0 20px}
.coin-btn:active{transform:scale(0.92)}
.coin-btn::after{content:'';position:absolute;top:12%;left:20%;width:30%;height:20%;background:rgba(255,255,255,0.25);border-radius:50%;transform:rotate(-30deg)}

/* Float coins */
.float-coin{position:fixed;pointer-events:none;font-size:1.5rem;animation:floatUp .8s ease-out forwards;z-index:100}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(0.5)}}

/* Upgrades */
.upgrades{width:100%;max-width:400px;margin-top:16px}
.upgrade-title{font-size:1rem;font-weight:700;color:#fbbf24;margin-bottom:10px;text-align:center}
.upgrade{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.upgrade:hover{background:rgba(255,255,255,0.12);border-color:rgba(251,191,36,0.3)}
.upgrade.locked{opacity:0.4;cursor:not-allowed}
.upgrade .icon{font-size:2rem;width:48px;text-align:center}
.upgrade .info{flex:1}
.upgrade .name{font-weight:700;font-size:.95rem}
.upgrade .desc{font-size:.75rem;color:rgba(255,255,255,0.5)}
.upgrade .cost{font-size:.9rem;font-weight:700;color:#fbbf24;white-space:nowrap}
.upgrade .owned{font-size:.7rem;color:rgba(255,255,255,0.4)}

/* Level */
.level-bar{width:100%;max-width:400px;margin:16px 0 8px}
.level-label{font-size:.8rem;color:rgba(255,255,255,0.6);margin-bottom:6px;display:flex;justify-content:space-between}
.level-track{height:10px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden}
.level-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);border-radius:10px;transition:width .3s}

/* Rambam levels */
.rambam{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2);border-radius:14px;padding:14px;margin-top:16px;width:100%;max-width:400px;text-align:center}
.rambam h3{font-size:.9rem;color:#fbbf24;margin-bottom:8px}
.rambam .current{font-size:1rem;font-weight:700}

/* Back button */
.back-btn{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;z-index:50}

/* Particles */
.particle{position:fixed;pointer-events:none;border-radius:50%;z-index:99}
</style>
</head>
<body>
<a href="../" class="back-btn">🏠</a>
<div class="game">
  <h1>🪙 צדקה קליקר</h1>
  <p class="subtitle">לחצו על המטבע ואספו צדקה!</p>

  <div class="score-area">
    <div class="coins" id="coinDisplay">0</div>
    <div class="per-sec" id="perSec">0 מטבעות / שנייה</div>
  </div>

  <div class="coin-btn" id="bigCoin" ontouchstart="">🪙</div>

  <div class="level-bar">
    <div class="level-label"><span id="levelName">רמה 1: מתחילים</span><span id="levelNum">1/8</span></div>
    <div class="level-track"><div class="level-fill" id="levelFill" style="width:0%"></div></div>
  </div>

  <div class="rambam" id="rambamBox">
    <h3>📜 8 דרגות הצדקה (רמב"ם)</h3>
    <div class="current" id="rambamLevel">דרגה 1: נותן צדקה בעצב</div>
  </div>

  <div class="upgrades">
    <div class="upgrade-title">⬆️ שדרוגים</div>
    <div id="upgradeList"></div>
  </div>
</div>

<script>
const RAMBAM = [
  'נותן צדקה בעצב',
  'נותן פחות מהראוי בסבר פנים',
  'נותן לעני אחרי שמבקש',
  'נותן לעני לפני שמבקש',
  'הנותן שלא יודע למי נתן',
  'העני לא יודע ממי קיבל',
  'שניהם לא יודעים זה את זה',
  'מחזיק ביד העני — הלוואה, שותפות, עבודה'
];

const UPGRADES = [
  {name:'קופת צדקה', desc:'מייצרת 1/שנייה', icon:'🏦', baseCost:15, perSec:1},
  {name:'תרומה חודשית', desc:'מייצרת 5/שנייה', icon:'📅', baseCost:100, perSec:5},
  {name:'גמילות חסדים', desc:'מייצרת 20/שנייה', icon:'🤝', baseCost:500, perSec:20},
  {name:'הכנסת כלה', desc:'מייצרת 50/שנייה', icon:'👰', baseCost:2000, perSec:50},
  {name:'בית יתומים', desc:'מייצרת 150/שנייה', icon:'🏠', baseCost:7000, perSec:150},
  {name:'ישיבה', desc:'מייצרת 400/שנייה', icon:'📖', baseCost:20000, perSec:400},
  {name:'בית חולים', desc:'מייצרת 1000/שנייה', icon:'🏥', baseCost:75000, perSec:1000},
  {name:'קרן לדורות', desc:'מייצרת 3000/שנייה', icon:'🌟', baseCost:250000, perSec:3000},
];

let coins = 0, totalCoins = 0, coinsPerSec = 0, clickPower = 1;
let owned = new Array(UPGRADES.length).fill(0);

// Load save
try {
  const save = JSON.parse(localStorage.getItem('tzedaka-clicker'));
  if (save) { coins = save.c||0; totalCoins = save.t||0; owned = save.o||owned; clickPower = save.cp||1; recalcPerSec(); }
} catch(e){}

function recalcPerSec() {
  coinsPerSec = 0;
  owned.forEach((n,i) => coinsPerSec += n * UPGRADES[i].perSec);
}

function save() { try {
  localStorage.setItem('tzedaka-clicker', JSON.stringify({c:coins,t:totalCoins,o:owned,cp:clickPower})); } catch(e){}
}

function formatNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playClick() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 800 + Math.random()*400;
  o.type = 'sine';
  g.gain.value = 0.1;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.start(); o.stop(audioCtx.currentTime + 0.15);
}
function playLevelUp() {
  [523,659,784].forEach((f,i) => {
    setTimeout(() => {
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f; o.type = 'sine'; g.gain.value = 0.15;
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      o.start(); o.stop(audioCtx.currentTime + 0.3);
    }, i * 120);
  });
}

// Float coin
function spawnFloatCoin(x, y) {
  const el = document.createElement('div');
  el.className = 'float-coin';
  el.textContent = '+' + clickPower;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = '#fbbf24';
  el.style.fontWeight = '900';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// Particles
function spawnParticles(x, y) {
  for (let i = 0; i < 5; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random()*6;
    p.style.width = size+'px'; p.style.height = size+'px';
    p.style.left = x+'px'; p.style.top = y+'px';
    p.style.background = ['#fbbf24','#f59e0b','#fde68a','#fff'][Math.floor(Math.random()*4)];
    document.body.appendChild(p);
    const angle = Math.random()*Math.PI*2;
    const dist = 30+Math.random()*60;
    const dx = Math.cos(angle)*dist, dy = Math.sin(angle)*dist;
    p.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${dx}px,${dy}px) scale(0)`,opacity:0}
    ], {duration:500,easing:'ease-out'});
    setTimeout(()=>p.remove(),500);
  }
}

// Click handler
document.getElementById('bigCoin').addEventListener('click', (e) => {
  const rect = e.target.getBoundingClientRect();
  const x = e.clientX || rect.left + rect.width/2;
  const y = e.clientY || rect.top;
  coins += clickPower;
  totalCoins += clickPower;
  playClick();
  spawnFloatCoin(x, y - 20);
  spawnParticles(x, y);
  updateUI();
});

// Upgrades
function renderUpgrades() {
  const list = document.getElementById('upgradeList');
  list.innerHTML = UPGRADES.map((u, i) => {
    const cost = Math.floor(u.baseCost * Math.pow(1.15, owned[i]));
    const canBuy = coins >= cost;
    return `<div class="upgrade ${canBuy?'':'locked'}" onclick="buyUpgrade(${i})">
      <div class="icon">${u.icon}</div>
      <div class="info"><div class="name">${u.name}</div><div class="desc">${u.desc}</div><div class="owned">${owned[i] > 0 ? 'יש: '+owned[i] : ''}</div></div>
      <div class="cost">🪙 ${formatNum(cost)}</div>
    </div>`;
  }).join('');
}

function buyUpgrade(i) {
  const cost = Math.floor(UPGRADES[i].baseCost * Math.pow(1.15, owned[i]));
  if (coins < cost) return;
  coins -= cost;
  owned[i]++;
  recalcPerSec();
  playLevelUp();
  save();
  updateUI();
}

// Level & Rambam
function getLevel() {
  if (totalCoins < 50) return 0;
  if (totalCoins < 200) return 1;
  if (totalCoins < 1000) return 2;
  if (totalCoins < 5000) return 3;
  if (totalCoins < 20000) return 4;
  if (totalCoins < 100000) return 5;
  if (totalCoins < 500000) return 6;
  return 7;
}

let prevLevel = -1;
function updateUI() {
  document.getElementById('coinDisplay').textContent = formatNum(coins);
  document.getElementById('perSec').textContent = formatNum(coinsPerSec) + ' מטבעות / שנייה';

  const lvl = getLevel();
  const thresholds = [0,50,200,1000,5000,20000,100000,500000];
  const next = lvl < 7 ? thresholds[lvl+1] : thresholds[7];
  const prev = thresholds[lvl];
  const pct = lvl >= 7 ? 100 : Math.min(100, ((totalCoins-prev)/(next-prev))*100);
  document.getElementById('levelFill').style.width = pct+'%';
  document.getElementById('levelName').textContent = `רמה ${lvl+1}`;
  document.getElementById('levelNum').textContent = `${lvl+1}/8`;
  document.getElementById('rambamLevel').textContent = `דרגה ${lvl+1}: ${RAMBAM[lvl]}`;

  if (lvl !== prevLevel && prevLevel >= 0) playLevelUp();
  prevLevel = lvl;

  renderUpgrades();
}

// Game loop
setInterval(() => {
  if (coinsPerSec > 0) {
    coins += coinsPerSec / 10;
    totalCoins += coinsPerSec / 10;
    updateUI();
  }
  save();
}, 100);

updateUI();
</script>
<!-- Analytics -->
<script async src="https://cdn.counter.dev/script.js" data-id="shemesh613" data-utcoffset="2"></script>
</body>
</html>
