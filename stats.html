<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 סטטיסטיקות — מפורים עד פסח</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(135deg, #0f0a1e 0%, #1a1035 50%, #0f0a1e 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 2rem;
      margin: 20px 0;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stats-container {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 16px;
      padding: 30px;
      margin: 20px 0;
      text-align: center;
      backdrop-filter: blur(10px);
      max-width: 700px;
      width: 100%;
    }
    .stats-container h2 {
      color: #a78bfa;
      margin-bottom: 16px;
      font-size: 1.3rem;
    }
    .info {
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 12px;
      padding: 20px;
      max-width: 600px;
      margin: 20px 0;
      line-height: 1.8;
      text-align: center;
      color: #94a3b8;
    }
    .back-link {
      margin-top: 30px;
      color: #a78bfa;
      text-decoration: none;
      font-size: 1.1rem;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>📊 סטטיסטיקות האתר</h1>

  <div class="stats-container">
    <h2>🌍 מבקרים לפי מדינה + סה"כ צפיות</h2>
    <a href="https://www.flagcounter.me/details/gG5" target="_blank">
      <img src="https://www.flagcounter.me/gG5/" alt="Flag Counter" style="border:0; max-width:100%;">
    </a>
    <p style="color:#94a3b8; margin-top:12px; font-size:0.9rem;">👆 לחץ לפרטים מלאים</p>
  </div>

  <div class="info">
    💡 המונה סופר כל כניסה לאתר לפי מדינה.<br>
    🔄 רענן את הדף כדי לראות עדכון.<br>
    📊 לחץ על המונה לדף פרטים מלא — בלי לוגין!
  </div>

  <a href="index.html" class="back-link">← חזרה לאתר הראשי</a>
</body>
</html>
