<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 סטטיסטיקות — מפורים עד פסח</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(135deg, #0f0a1e 0%, #1a1035 50%, #0f0a1e 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 2rem;
      margin: 20px 0;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge-section {
      margin: 30px 0;
      text-align: center;
    }
    .badge-section img {
      height: 40px;
      margin: 8px;
    }
    .info {
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 12px;
      padding: 20px;
      max-width: 600px;
      margin: 20px 0;
      line-height: 1.8;
      text-align: center;
    }
    .back-link {
      margin-top: 30px;
      color: #a78bfa;
      text-decoration: none;
      font-size: 1.1rem;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>📊 סטטיסטיקות האתר</h1>
  <div class="badge-section">
    <p style="color:#94a3b8; margin-bottom:12px;">🔢 מונה ביקורים:</p>
    <img src="https://api.visitorbadge.io/api/visitors?path=shemesh613-purim-home&label=Total%20Visitors&labelColor=%231a1035&countColor=%237c3aed" alt="visitor count"/>
    <br>
    <img src="https://api.visitorbadge.io/api/daily?path=shemesh613-purim-home&label=Today&labelColor=%231a1035&countColor=%2360a5fa" alt="daily visitors"/>
  </div>
  <div class="info">
    💡 המונים מתעדכנים בזמן אמת.<br>
    כל כניסה לאתר או לדף זה נספרת אוטומטית.<br>
    אין צורך בלוגין — הכל פתוח לצפייה!
  </div>
  <a href="index.html" class="back-link">← חזרה לאתר הראשי</a>
</body>
</html>
